# pnpm 設定 (セキュリティ強化)。Vercel の pnpm 9 互換のため単一パッケージを明示する。
packages:
  - .

# 新しく公開されたバージョンは指定分(分)経過するまでインストール対象にしない。
# npm パッケージ公開直後に乗っ取られた版を踏むサプライチェーン攻撃を緩和する。
minimumReleaseAge: 1440 # 24時間
minimumReleaseAgeExclude:
  - '@elzup/*' # 自前パッケージは即時取り込み可

# 依存パッケージのインストール時ビルドスクリプト (preinstall/install/postinstall)
# は既定で全てブロックされる。実行を許可するものだけを明示的に列挙する。
# (空 = 全ブロック。pnpm install 後に必要なものを `pnpm approve-builds` で追加)
onlyBuiltDependencies: []

# 既知脆弱性のある transitive 依存を patched 版へ強制したい場合は overrides を使う:
#   overrides:
#     'some-pkg@<1.2.3': '>=1.2.3'
# (現状の audit 指摘は多くが古い依存で patched 版が npm 未公開のため、
#  本質的な解消には依存自体のアップグレードが必要)
